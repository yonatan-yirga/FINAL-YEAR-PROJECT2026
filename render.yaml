services:
  # 1. PostgreSQL Database
  - type: pserv
    name: internship-db
    env: python
    plan: free

  # 2. Redis for WebSockets (Django Channels)
  - type: redis
    name: internship-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # 3. Django Backend
  - type: web
    name: internship-backend
    env: python
    plan: free
    rootDir: Backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: internship-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: internship-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        fromService:
          type: static
          name: internship-frontend
          property: url

  # 4. React Frontend (Static Site)
  - type: static
    name: internship-frontend
    env: node
    plan: free
    rootDir: Frontend
    buildCommand: "npm install && npm run build"
    publishPath: dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: internship-backend
          property: url
          suffix: /api
